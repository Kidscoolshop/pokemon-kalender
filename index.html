<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pokémon Release Kalender 2026 – KiDS Coolshop</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f4f4f6; color: #1a1a2e; }

  .page-header {
    background: #fff;
    border-bottom: 4px solid #E8002D;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .page-header .logo img { height: 70px; object-fit: contain; }
  .header-center { text-align: center; flex: 1; padding: 0 20px; }
  .header-center h1 { font-size: 26px; font-weight: 700; color: #E8002D; }
  .header-center p { font-size: 13px; color: #666; margin-top: 4px; }
  .pikachu-wrap { width: 120px; display: flex; align-items: center; justify-content: flex-end; }
  .pikachu-wrap img { height: 110px; object-fit: contain; }

  #status-bar {
    display: none;
    margin: 12px 40px 0;
    padding: 10px 16px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
  }
  #status-bar.loading { background: #e0f0ff; color: #1e40af; display: block; }
  #status-bar.error   { background: #fee2e2; color: #991b1b; display: block; }
  #status-bar.ok      { background: #d4f0e5; color: #065f46; display: block; }

  .legend {
    display: flex; flex-wrap: wrap; gap: 18px;
    padding: 14px 40px; background: #fff;
    border-bottom: 1px solid #e0e0e0;
    font-size: 13px; color: #444;
    margin-top: 16px;
  }
  .legend-item { display: flex; align-items: center; gap: 7px; }
  .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .dot-green  { background: #1D9E75; }
  .dot-red    { background: #E24B4A; }
  .dot-orange { background: #EF9F27; }
  .dot-blue   { background: #378ADD; }

  #last-updated {
    text-align: right;
    font-size: 11px; color: #999;
    padding: 6px 40px 0;
  }

  .main { padding: 20px 40px 48px; }

  .section { margin-bottom: 32px; }
  .section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
  .date-pill {
    font-size: 12px; font-weight: 700;
    padding: 4px 14px; border-radius: 20px;
    white-space: nowrap;
  }
  .date-pill-green  { background: #d4f0e5; color: #0f6e56; }
  .date-pill-amber  { background: #faeeda; color: #633806; }
  .date-pill-blue   { background: #dceeff; color: #0c447c; }
  .section-line { flex: 1; height: 1px; background: #ddd; }
  .section-label { font-size: 11px; font-weight: 700; color: #888; text-transform: uppercase; letter-spacing: 0.08em; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; }
  .card {
    background: #fff; border-radius: 12px;
    border: 1px solid #e5e5e5; border-left-width: 4px;
    padding: 14px 16px;
    transition: box-shadow 0.15s;
  }
  .card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.08); }
  .card-ok      { border-left-color: #1D9E75; }
  .card-delay   { border-left-color: #E24B4A; }
  .card-newdate { border-left-color: #EF9F27; }
  .card-tba     { border-left-color: #378ADD; }

  .card-varenr { font-size: 10px; color: #aaa; font-family: monospace; margin-bottom: 5px; }
  .card-name { font-size: 14px; font-weight: 700; color: #1a1a2e; line-height: 1.3; margin-bottom: 8px; }
  .card-price-row { display: flex; align-items: baseline; gap: 6px; }
  .card-price { font-size: 16px; font-weight: 700; color: #E8002D; }
  .card-price-label { font-size: 11px; color: #999; }
  .card-badge {
    margin-top: 9px; display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 3px 8px; border-radius: 6px;
  }
  .badge-red    { background: #fde8e8; color: #7f1111; }
  .badge-amber  { background: #fef3d5; color: #7a4500; }
  .badge-blue   { background: #dceeff; color: #0c447c; }

  .page-footer {
    text-align: center; font-size: 11px; color: #bbb;
    padding: 16px 40px 24px;
    border-top: 1px solid #e5e5e5; background: #fff;
  }

  .empty-state {
    text-align: center; padding: 60px 20px;
    color: #999; font-size: 15px;
  }
  .empty-state .big { font-size: 48px; margin-bottom: 12px; }

  #reload-btn {
    display: none;
    margin: 12px 40px 0;
    padding: 8px 18px;
    background: #f4f4f6;
    border: 1.5px solid #ddd;
    border-radius: 8px;
    font-size: 12px;
    color: #555;
    cursor: pointer;
  }
  #reload-btn:hover { background: #e8e8e8; }
</style>
</head>

</div>
<div id="last-updated"></div>

<div class="main">
  <div id="content-area">
    <div class="empty-state">
      <div class="big">⏳</div>
      Henter produktdata…
    </div>
  </div>
</div>

<div class="page-footer">
  KiDS Coolshop &middot; Vejledende udsalgspriser fra Asmodee &middot; Må ikke videredeles eksternt
</div>

<script>
const SHEET_ID = "1OtNpjR67QbS_h4-IKcgCpYPvwk8OEvGyq91tXO7W4hU";

function setStatus(msg, type) {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = type;
}

function parsePrice(val) {
  if (val === null || val === undefined || val === '') return null;
  const n = parseFloat(String(val).replace(',', '.'));
  return isNaN(n) ? null : n.toLocaleString('da-DK', { minimumFractionDigits: 2, maximumFractionDigits: 2 }) + ' kr';
}

// Extract a sortable Date object from whatever format Google Sheets returns
// Handles: "2026-03-27", "2026-03-27 00:00:00", "2026/03/27", "27/3/2026", "13/3" etc.
function parseSortableDate(raw) {
  if (!raw) return null;
  raw = String(raw).trim();

  // "2026-03-27" or "2026-03-27 00:00:00"
  let m = raw.match(/^(\d{4})-(\d{1,2})-(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);

  // "2026/03/27"
  m = raw.match(/^(\d{4})\/(\d{1,2})\/(\d{1,2})/);
  if (m) return new Date(+m[1], +m[2]-1, +m[3]);

  // "27/3/2026" or "27-3-2026"
  m = raw.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
  if (m) return new Date(+m[3], +m[2]-1, +m[1]);

  // "13/3" or "13/3/26" — assume current or next year
  m = raw.match(/^(\d{1,2})\/(\d{1,2})$/);
  if (m) {
    const year = new Date().getFullYear();
    return new Date(year, +m[2]-1, +m[1]);
  }

  return null;
}

function formatDate(raw) {
  const d = parseSortableDate(raw);
  if (d) {
    return d.toLocaleDateString('da-DK', { day: 'numeric', month: 'long', year: 'numeric' });
  }
  return String(raw).trim();
}

function classifyStatus(status) {
  if (!status) return { cardClass: 'card-ok', badgeClass: '', badgeText: '' };
  const s = status.toLowerCase();
  if (s.includes('forsinket') && (s.includes('ny') || s.includes('juni') || s.includes('april') || s.includes('marts'))) {
    return { cardClass: 'card-newdate', badgeClass: 'badge-amber', badgeText: status };
  }
  if (s.includes('forsinket')) {
    return { cardClass: 'card-delay', badgeClass: 'badge-red', badgeText: status };
  }
  if (s.includes('navn') || s.includes('snart')) {
    return { cardClass: 'card-tba', badgeClass: 'badge-blue', badgeText: status };
  }
  return { cardClass: 'card-ok', badgeClass: '', badgeText: '' };
}

function sectionLabel(rows) {
  const names = rows.map(r => r.name || '');
  const series = ['Perfect Order','Chaos Rising','Ascended Heroes','ME05','First Partner','Sommer'];
  for (const s of series) {
    if (names.some(n => n.includes(s))) return s;
  }
  return '';
}

function datePillClass(rows) {
  const allTba   = rows.every(r => r.status && (r.status.toLowerCase().includes('navn') || r.status.toLowerCase().includes('snart')));
  const hasDelay = rows.some(r => r.status && r.status.toLowerCase().includes('forsinket'));
  if (allTba)   return 'date-pill-blue';
  if (hasDelay) return 'date-pill-amber';
  return 'date-pill-green';
}

// Group rows by their raw date string, then sort groups chronologically
function groupAndSort(rows) {
  const groups = {};
  rows.forEach(r => {
    const key = String(r.rawDate || '').trim() || 'Ukendt dato';
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const sorted = Object.keys(groups).sort((a, b) => {
    const da = parseSortableDate(a);
    const db = parseSortableDate(b);
    // Both parseable → sort by date
    if (da && db) return da - db;
    // Only one parseable → put parseable first
    if (da) return -1;
    if (db) return 1;
    // Neither → alphabetical
    return a.localeCompare(b, 'da');
  });

  return { groups, sorted };
}

function renderContent(rows) {
  const { groups, sorted } = groupAndSort(rows);
  let html = '';

  sorted.forEach(key => {
    const grp = groups[key];
    const pillClass   = datePillClass(grp);
    const label       = sectionLabel(grp);
    const displayDate = formatDate(key) || key;

    html += `<div class="section">
      <div class="section-header">
        <div class="date-pill ${pillClass}">${displayDate}</div>
        <div class="section-line"></div>
        ${label ? `<div class="section-label">${label}</div>` : ''}
      </div>
      <div class="cards">`;

    grp.forEach(r => {
      const s = classifyStatus(r.status);
      html += `<div class="card ${s.cardClass}">
        <div class="card-varenr">${r.varenr || ''}</div>
        <div class="card-name">${r.name || ''}</div>
        <div class="card-price-row">
          <div class="card-price">${r.price || '–'}</div>
          <div class="card-price-label">MRSP</div>
        </div>
        ${s.badgeText ? `<div class="card-badge ${s.badgeClass}">${s.badgeText}</div>` : ''}
      </div>`;
    });

    html += `</div></div>`;
  });

  document.getElementById('content-area').innerHTML =
    html || '<div class="empty-state"><div class="big">🤔</div>Ingen produkter fundet i arket.</div>';
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  if (lines.length < 2) return [];

  function splitLine(line) {
    const fields = [];
    let cur = '', inQ = false;
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') {
        if (inQ && line[i+1] === '"') { cur += '"'; i++; }
        else inQ = !inQ;
      } else if (c === ',' && !inQ) {
        fields.push(cur); cur = '';
      } else cur += c;
    }
    fields.push(cur);
    return fields;
  }

  const headers = splitLine(lines[0]).map(h => h.trim().toLowerCase());
  const idx = {
    varenr: headers.findIndex(h => h.includes('varenummer') || h.includes('varenr')),
    name:   headers.findIndex(h => h.includes('udgivelse') || h.includes('navn') || h.includes('name')),
    date:   headers.findIndex(h => h.includes('release') || h.includes('dato')),
    price:  headers.findIndex(h => h.includes('mrsp') || h.includes('pris')),
    status: headers.findIndex(h => h.includes('status')),
  };

  const rows = [];
  for (let i = 1; i < lines.length; i++) {
    const f = splitLine(lines[i]);
    rows.push({
      varenr:  idx.varenr  >= 0 ? (f[idx.varenr]  || '').trim() : '',
      name:    idx.name    >= 0 ? (f[idx.name]    || '').trim() : '',
      rawDate: idx.date    >= 0 ? (f[idx.date]    || '').trim() : '',
      price:   parsePrice(idx.price >= 0 ? (f[idx.price] || '').trim() : ''),
      status:  idx.status  >= 0 ? (f[idx.status]  || '').trim() : '',
    });
  }
  return rows.filter(r => r.name);
}

async function fetchSheet() {
  setStatus('⏳ Henter data fra Google Sheets…', 'loading');
  document.getElementById('reload-btn').style.display = 'none';

  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=Ark1`;

  let resp;
  try {
    resp = await fetch(url);
  } catch(e) {
    setStatus('❌ Netværksfejl – siden skal ligge på en webserver (fx GitHub Pages), ikke åbnes fra disk.', 'error');
    document.getElementById('reload-btn').style.display = 'inline-block';
    return;
  }

  if (!resp.ok) {
    setStatus(`❌ HTTP ${resp.status} – tjek at arket er delt offentligt (Alle med linket kan se).`, 'error');
    document.getElementById('reload-btn').style.display = 'inline-block';
    return;
  }

  const csv = await resp.text();
  if (!csv || csv.includes('UNAUTHENTICATED')) {
    setStatus('❌ Adgang nægtet – gå til Google Sheets → Del → Alle med linket kan se.', 'error');
    document.getElementById('reload-btn').style.display = 'inline-block';
    return;
  }

  const rows = parseCSV(csv);
  if (rows.length === 0) {
    setStatus('⚠️ Arket ser tomt ud – tjek at fanen hedder "Ark1".', 'error');
    document.getElementById('reload-btn').style.display = 'inline-block';
    return;
  }

  renderContent(rows);

  const now = new Date().toLocaleString('da-DK');
  document.getElementById('last-updated').textContent = `Sidst opdateret: ${now}`;
  setStatus(`✅ ${rows.length} produkter hentet succesfuldt.`, 'ok');
  document.getElementById('reload-btn').style.display = 'inline-block';

  setTimeout(() => { document.getElementById('status-bar').className = ''; }, 3000);
}

window.addEventListener('DOMContentLoaded', fetchSheet);
</script>

</body>
</html>
